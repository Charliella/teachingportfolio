<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>整齊留言板系統 - 縮放功能版</title>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc, updateDoc, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMWydxNTMsPxENrECTo6VeyS7YIwbLjZU",
            authDomain: "nameless-16961.firebaseapp.com",
            databaseURL: "https://nameless-16961-default-rtdb.firebaseio.com",
            projectId: "nameless-16961",
            storageBucket: "nameless-16961.firebasestorage.app",
            messagingSenderId: "49208226272",
            appId: "1:49208226272:web:da2c190a9d97f003f8fb85",
            measurementId: "G-QR1SDBTBVN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseCollection = collection;
        window.firebaseAddDoc = addDoc;
        window.firebaseOnSnapshot = onSnapshot;
        window.firebaseQuery = query;
        window.firebaseOrderBy = orderBy;
        window.firebaseServerTimestamp = serverTimestamp;
        window.firebaseDoc = doc;
        window.firebaseSetDoc = setDoc;
        window.firebaseGetDoc = getDoc;
        window.firebaseUpdateDoc = updateDoc;
        window.firebaseDeleteDoc = deleteDoc;
        window.firebaseGetDocs = getDocs;
        window.firebaseWriteBatch = writeBatch;
        
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.onAuthStateChanged = onAuthStateChanged;
        window.signOut = signOut;
    </script>
    <style>
        :root {
            --neon-green: #00ff41; --neon-orange: #f39c12; --neon-red: #ff003c;
            --neon-blue: #00d2ff; --neon-purple: #bc13fe; --neon-pink: #ff007f;
            --bg-dark: #0a0a0b;
            /* 縮放變數 */
            --zoom-scale: 1; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100dvh; width: 100vw; margin: 0; padding: 0; 
            overflow: hidden; background-color: var(--bg-dark);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; color: #fff;
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; 
            display: flex; justify-content: center; align-items: center; padding: 20px; text-align: center;
        }
        .key { background: #222; border: 1px solid #666; color: #fff; cursor: pointer; border-radius: 12px; font-weight: bold; }
        .key.action { background: var(--neon-orange); color: #000; }

        .app-wrapper { display: flex; flex-direction: column; height: 100dvh; display: none; }
        
        .header {
            background: #111; border-bottom: 2px solid var(--neon-blue);
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; flex-shrink: 0; flex-wrap: wrap; gap: 15px;
        }
        
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .tab-btn {
            background: transparent; color: #888; border: 1px solid #444;
            padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 13px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: rgba(0, 210, 255, 0.1); color: var(--neon-blue);
            border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .user-info { display: flex; align-items: center; gap: 15px; font-size: 14px; flex-wrap: wrap; }
        
        /* 縮放控制器樣式 */
        .zoom-container {
            display: flex; align-items: center; gap: 8px; background: #222;
            padding: 5px 12px; border-radius: 20px; border: 1px solid #444;
        }
        .zoom-container span { font-size: 12px; color: #aaa; white-space: nowrap; }
        input[type=range] { cursor: pointer; width: 80px; accent-color: var(--neon-blue); }

        .logout-btn { background: #444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .admin-tool-btn {
            background: var(--neon-purple); color: white; border: none; 
            padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold;
        }
        .admin-tool-btn.danger { background: var(--neon-red); }

        /* 留言展示區 */
        .cloud-canvas {
            flex-grow: 1; position: relative; background: #050505;
            overflow-y: auto; padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(calc(200px * var(--zoom-scale)), 1fr));
            grid-auto-rows: min-content;
            gap: calc(15px * var(--zoom-scale));
            align-content: start;
        }

        .cloud-word {
            position: relative; padding: calc(12px * var(--zoom-scale)); border-radius: 12px;
            background: rgba(30, 30, 35, 0.8); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            display: flex; flex-direction: column; justify-content: center;
            min-height: calc(70px * var(--zoom-scale)); word-break: break-all;
        }
        
        .word-author { 
            font-size: calc(0.7em * var(--zoom-scale)); 
            opacity: 0.7; margin-bottom: 5px; font-weight: bold; 
        }
        .word-text { 
            font-size: calc(1em * var(--zoom-scale)); 
            line-height: 1.4; 
        }

        .admin-controls {
            display: none; position: absolute; top: 5px; right: 5px;
            background: rgba(0,0,0,0.8); border-radius: 6px; padding: 2px; z-index: 10;
        }
        .cloud-word:hover .admin-controls { display: flex; gap: 5px; }
        .admin-btn { background: none; border: none; font-size: 16px; cursor: pointer; }

        .input-area {
            background: #111; border-top: 1px solid #333;
            display: flex; align-items: center; padding: 15px 20px; gap: 10px; flex-shrink: 0;
        }
        .input-box {
            background: #222; color: #fff; border: 1px solid #555;
            padding: 12px; border-radius: 10px; font-size: 16px; outline: none; width: 100%;
        }
        .send-btn {
            background: var(--neon-orange); color: #000; border: none;
            padding: 12px 25px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;
        }

        /* 狀態訊息顯示區 (等待老師發佈或權限提示) */
        #statusMessage {
            display: none; flex-grow: 1; justify-content: center; align-items: center;
            font-size: 20px; color: #888; text-align: center; padding: 20px; line-height: 1.5;
        }

        /* 浮動提示元件 */
        #toast {
            display: none; position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: var(--neon-green); color: #000; padding: 12px 25px; border-radius: 30px;
            z-index: 10000; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(0,255,65,0.4);
            animation: fadeInOut 2s ease forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; top: 60px; }
            10% { opacity: 1; top: 80px; }
            90% { opacity: 1; top: 80px; }
            100% { opacity: 0; top: 60px; display: none; }
        }

        @media (max-width: 600px) {
            .header { padding: 10px; }
            .user-info { width: 100%; justify-content: space-between; }
            .zoom-container { order: 3; width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<!-- 浮動提示 -->
<div id="toast">已送出！</div>

<div id="loginOverlay" class="overlay">
    <div style="max-width: 400px; text-align: center; width: 100%;">
        <h1 id="authTitle" style="font-size: 32px; color: var(--neon-orange); margin-bottom: 20px;">學生登入</h1>
        <input type="text" id="regNameInput" placeholder="你的真實姓名" class="input-box" style="margin-bottom: 15px; display: none;">
        <input type="email" id="emailInput" placeholder="電子郵件" class="input-box" style="margin-bottom: 15px;">
        <input type="password" id="passwordInput" placeholder="密碼 (至少6碼)" class="input-box" style="margin-bottom: 20px;">
        <button class="key action" id="authBtn" style="padding: 12px; font-size: 18px; width: 100%;" onclick="handleAuth()">登入</button>
        <div class="toggle-text" onclick="toggleAuthMode()" id="toggleModeText" style="margin-top: 15px; color:#aaa; cursor:pointer;">沒有帳號？點此註冊</div>
        <div id="loginMessage" style="color: var(--neon-red); font-size: 14px; margin-top: 10px;"></div>
    </div>
</div>

<div class="app-wrapper" id="appWrapper">
    <div class="header">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode(1)" id="tab1">1. 公開</button>
            <button class="tab-btn" onclick="switchMode(2)" id="tab2">2. 半匿名</button>
            <button class="tab-btn" onclick="switchMode(3)" id="tab3">3. 全匿名</button>
            <button class="tab-btn" onclick="switchMode(4)" id="tab4">4. 師看半匿</button>
            <button class="tab-btn" onclick="switchMode(5)" id="tab5">5. 師看全匿</button>
        </div>

        <!-- 縮放控制器 -->
        <div class="zoom-container">
            <span>顯示縮放</span>
            <input type="range" min="0.5" max="2" step="0.1" value="1" id="zoomSlider" oninput="updateZoom(this.value)">
            <span id="zoomVal">1.0x</span>
        </div>

        <div class="user-info">
            <span id="displayEmail" style="color:var(--neon-green); font-weight:bold;"></span>
            <span id="adminControls" style="display:none; gap:8px; align-items:center;">
                <button class="admin-tool-btn" id="publishBtn" onclick="togglePublishState()" style="background: var(--neon-blue); color: #000;">結束留言並發表</button>
                <button class="admin-tool-btn" onclick="exportData()">匯出</button>
                <button class="admin-tool-btn danger" onclick="clearAllData()">清空</button>
            </span>
            <button class="logout-btn" onclick="logout()">登出</button>
        </div>
    </div>

    <!-- 訊息版 / 狀態文字 區 -->
    <div class="cloud-canvas" id="cloudCanvas"></div>
    <div id="statusMessage"></div>

    <div class="input-area" id="inputArea">
        <input type="text" id="msgInput" class="input-box" placeholder="在這裡輸入想說的話..." onkeypress="handleEnter(event)">
        <button class="send-btn" onclick="sendMessage()">發送</button>
    </div>
</div>

<script>
    const ADMIN_EMAIL = "a776663@gmail.com"; 
    let currentUser = null;
    let currentUserName = "無名氏"; 
    let isAdmin = false;
    let currentMode = 1;
    let isRegisterMode = false; 
    let isPublished = false; // 控制是否發布留言

    let unsubscribeSnapshot = null;
    let unsubscribeSettings = null;

    const neonColors = ["var(--neon-green)", "var(--neon-orange)", "var(--neon-blue)", "var(--neon-purple)", "var(--neon-pink)"];

    function updateZoom(val) {
        document.documentElement.style.setProperty('--zoom-scale', val);
        document.getElementById('zoomVal').textContent = parseFloat(val).toFixed(1) + 'x';
    }

    // 顯示自訂提示
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        toast.style.animation = 'none';
        toast.offsetHeight; /* trigger reflow */
        toast.style.animation = null;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        window.onAuthStateChanged(window.firebaseAuth, async (user) => {
            if (user) {
                currentUser = user;
                isAdmin = (user.email === ADMIN_EMAIL);
                try {
                    const userDocRef = window.firebaseDoc(window.firebaseDb, "users", user.uid);
                    const userDoc = await window.firebaseGetDoc(userDocRef);
                    if (userDoc.exists()) currentUserName = userDoc.data().name;
                    else currentUserName = user.email.split('@')[0];
                } catch (e) { console.error(e); }

                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('appWrapper').style.display = 'flex';
                document.getElementById('displayEmail').textContent = currentUserName + (isAdmin ? " (教)" : "");
                document.getElementById('adminControls').style.display = isAdmin ? 'flex' : 'none';

                // 監聽全域的系統狀態 (將狀態儲存在原本的 wordcloud_msgs 集合中，避開權限問題)
                const stateRef = window.firebaseDoc(window.firebaseDb, "wordcloud_msgs", "_GLOBAL_STATE_");
                unsubscribeSettings = window.firebaseOnSnapshot(stateRef, (docSnap) => {
                    if (docSnap.exists()) {
                        isPublished = docSnap.data().isPublished === true;
                    } else {
                        isPublished = false;
                    }
                    updateBoardVisibility();
                });

                switchMode(1);
            } else {
                currentUser = null;
                isAdmin = false;
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('appWrapper').style.display = 'none';
                if(unsubscribeSnapshot) unsubscribeSnapshot();
                if(unsubscribeSettings) unsubscribeSettings();
            }
        });
    });

    // 處理畫面隱藏與顯示的邏輯
    function updateBoardVisibility() {
        const canvas = document.getElementById('cloudCanvas');
        const inputArea = document.getElementById('inputArea');
        const statusMsg = document.getElementById('statusMessage');
        const publishBtn = document.getElementById('publishBtn');

        // 教師按鈕樣式更新
        if (publishBtn) {
            publishBtn.innerText = isPublished ? "重新開放留言" : "結束留言並發表";
            publishBtn.style.background = isPublished ? "var(--neon-green)" : "var(--neon-blue)";
        }

        // 輸入區顯示邏輯
        if (isAdmin) {
            inputArea.style.display = "flex";
        } else {
            inputArea.style.display = isPublished ? "none" : "flex";
        }

        let showCanvas = false;
        let waitText = "";

        if (isAdmin) {
            showCanvas = true; // 老師永遠看得到畫布
        } else {
            if (currentMode === 4 || currentMode === 5) {
                showCanvas = false;
                waitText = "此模式為不公開收集<br>僅教師可查看留言內容。";
            } else {
                showCanvas = isPublished;
                waitText = isPublished ? "" : "留言收集區<br>等待老師結束留言並發表...";
            }
        }

        if (showCanvas) {
            canvas.style.display = "grid";
            statusMsg.style.display = "none";
        } else {
            canvas.style.display = "none";
            statusMsg.style.display = "flex";
            statusMsg.innerHTML = waitText;
        }
    }

    // 教師切換全域發表狀態
    window.togglePublishState = async function() {
        if (!isAdmin) return;
        try {
            // 使用 wordcloud_msgs 集合來存狀態，因為您已有此集合的讀寫權限
            const stateRef = window.firebaseDoc(window.firebaseDb, "wordcloud_msgs", "_GLOBAL_STATE_");
            await window.firebaseSetDoc(stateRef, { isPublished: !isPublished }, { merge: true });
        } catch (error) {
            alert("狀態切換失敗，請確認網路或資料庫連線！\n錯誤: " + error.message);
            console.error(error);
        }
    };

    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('regNameInput').style.display = isRegisterMode ? 'block' : 'none';
        document.getElementById('authTitle').innerText = isRegisterMode ? '學生註冊' : '學生登入';
        document.getElementById('authBtn').innerText = isRegisterMode ? '建立帳號' : '登入';
        document.getElementById('toggleModeText').innerText = isRegisterMode ? '已有帳號？點此登入' : '沒有帳號？點此註冊';
    }

    async function handleAuth() {
        const email = document.getElementById('emailInput').value.trim();
        const pwd = document.getElementById('passwordInput').value.trim();
        const name = document.getElementById('regNameInput').value.trim();
        const msgDiv = document.getElementById('loginMessage');
        if (!email || !pwd) { msgDiv.textContent = "欄位不可為空！"; return; }
        
        msgDiv.textContent = "處理中...";
        try {
            if (isRegisterMode) {
                const userCredential = await window.createUserWithEmailAndPassword(window.firebaseAuth, email, pwd);
                await window.firebaseSetDoc(window.firebaseDoc(window.firebaseDb, "users", userCredential.user.uid), { name: name, email: email });
            } else {
                await window.signInWithEmailAndPassword(window.firebaseAuth, email, pwd);
            }
        } catch (error) { msgDiv.textContent = "錯誤: " + error.message; }
    }

    async function logout() { await window.signOut(window.firebaseAuth); }

    function switchMode(mode) {
        currentMode = mode;
        for(let i=1; i<=5; i++) {
            const tab = document.getElementById(`tab${i}`);
            if(tab) tab.classList.toggle('active', i === mode);
        }
        updateBoardVisibility();
        loadCloudWords();
    }

    function loadCloudWords() {
        if (unsubscribeSnapshot) unsubscribeSnapshot();
        const canvas = document.getElementById('cloudCanvas');
        const msgRef = window.firebaseCollection(window.firebaseDb, "wordcloud_msgs");
        const q = window.firebaseQuery(msgRef, window.firebaseOrderBy("timestamp", "asc"));

        unsubscribeSnapshot = window.firebaseOnSnapshot(q, (snapshot) => {
            canvas.innerHTML = ''; 
            snapshot.forEach((doc) => {
                if (doc.id === "_GLOBAL_STATE_") return; // 略過狀態紀錄的特殊文件
                const data = doc.data();
                if (data.mode !== currentMode) return; 
                createWordBubble(doc.id, data);
            });
        });
    }

    function createWordBubble(docId, data) {
        const canvas = document.getElementById('cloudCanvas');
        const div = document.createElement('div');
        div.className = 'cloud-word';

        let authorText = "";
        if (currentMode === 1) {
            authorText = escapeHtml(data.authorName || "無名氏");
        } else if (currentMode === 2) {
            authorText = isAdmin ? `[${escapeHtml(data.authorName)}]` : "半匿名用戶";
        } else if (currentMode === 3) {
            authorText = "完全匿名";
        } else if (currentMode === 4) {
            authorText = isAdmin ? `[${escapeHtml(data.authorName)}]` : "";
        } else if (currentMode === 5) {
            authorText = "完全匿名";
        }

        let innerHTML = '';
        if (isAdmin) {
            innerHTML += `
            <div class="admin-controls">
                <button class="admin-btn" onclick="editMsg(event, '${docId}', '${escapeJsStr(data.text)}')">✏️</button>
                <button class="admin-btn" onclick="deleteMsg(event, '${docId}')">🗑️</button>
            </div>`;
        }

        innerHTML += `<div class="word-author" style="color: ${neonColors[(data.mode || 1) % 5]};">${authorText}</div>`;
        innerHTML += `<div class="word-text">${escapeHtml(data.text)}</div>`;
        div.innerHTML = innerHTML;
        canvas.appendChild(div);
    }

    window.exportData = async function() {
        if (!isAdmin) return;
        const q = window.firebaseQuery(window.firebaseCollection(window.firebaseDb, "wordcloud_msgs"), window.firebaseOrderBy("timestamp", "asc"));
        const querySnapshot = await window.firebaseGetDocs(q);
        let content = "=== 匯出紀錄 ===\n";
        querySnapshot.forEach(doc => {
            if (doc.id === "_GLOBAL_STATE_") return;
            const d = doc.data();
            content += `[${d.timestamp?.toDate().toLocaleString()}] [模式${d.mode}] ${d.authorName}: ${d.text}\n`;
        });
        const blob = new Blob([content], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "留言紀錄.txt";
        a.click();
    };

    window.clearAllData = async function() {
        if (!isAdmin || !confirm("確定清空所有留言？")) return;
        const querySnapshot = await window.firebaseGetDocs(window.firebaseCollection(window.firebaseDb, "wordcloud_msgs"));
        const batch = window.firebaseWriteBatch(window.firebaseDb);
        querySnapshot.forEach(doc => {
            if (doc.id !== "_GLOBAL_STATE_") { // 刪除時保留狀態文件
                batch.delete(doc.ref);
            }
        });
        await batch.commit();
        alert("已清空");
    };

    window.editMsg = async function(event, docId, oldText) {
        event.stopPropagation();
        const newText = prompt("修改留言：", oldText);
        if (newText) {
            const docRef = window.firebaseDoc(window.firebaseDb, "wordcloud_msgs", docId);
            await window.firebaseUpdateDoc(docRef, { text: newText.trim() });
        }
    };

    window.deleteMsg = async function(event, docId) {
        event.stopPropagation();
        if (confirm("刪除此留言？")) {
            await window.firebaseDeleteDoc(window.firebaseDoc(window.firebaseDb, "wordcloud_msgs", docId));
        }
    };

    async function sendMessage() {
        const msgInput = document.getElementById('msgInput');
        const text = msgInput.value.trim();
        if (!text || !currentUser) return;
        
        if (!isAdmin && isPublished) {
            alert("老師已結束留言，無法再發送囉！");
            return;
        }

        msgInput.value = ""; 
        await window.firebaseAddDoc(window.firebaseCollection(window.firebaseDb, "wordcloud_msgs"), {
            text: text, mode: currentMode, authorUid: currentUser.uid,
            authorEmail: currentUser.email, authorName: currentUserName,
            timestamp: window.firebaseServerTimestamp()
        });

        if (!isAdmin) showToast("已送出！");
    }

    function handleEnter(e) { if (e.key === 'Enter') sendMessage(); }
    function escapeHtml(unsafe) { return (unsafe||"").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    function escapeJsStr(str) { return (str||"").replace(/'/g, "\\'"); }
</script>
</body>
</html>
